# Nome da aplicação
spring.application.name=MpFitness
server.port=${PORT:8080}

# Configurações do banco de dados (PostgreSQL) - via variáveis de ambiente
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Charset e timezone (Brasil)
spring.sql.init.encoding=UTF-8
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.locale=pt_BR

# Configuração para servir arquivos estáticos
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# Cloudinary - via variáveis de ambiente
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:mpfitness/produtos}

# SMTP / E-mail (Gmail) - via variáveis de ambiente
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.localhost=localhost
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# MercadoPago - via variáveis de ambiente
mercado_pago.access_token=${MERCADO_PAGO_ACCESS_TOKEN}
mercado_pago.webhook_secret=${MERCADO_PAGO_WEBHOOK_SECRET}

# JWT - via variáveis de ambiente
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
security.jwt.reset-expiration-ms=${JWT_RESET_EXPIRATION_MS:900000}

# Google OAuth2 - via variáveis de ambiente
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Frontend URLs - via variáveis de ambiente
frontend.url=${FRONTEND_URL}
frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL}

# Logging - Menos verbose em produção
logging.level.root=INFO
logging.level.com.example.MpFitness=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Server configurations
server.compression.enabled=true
server.compression.min-response-size=1024
server.http2.enabled=true
